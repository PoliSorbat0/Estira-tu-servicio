<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDCMD - Menú Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-principal: #0f172a;
            --bg-tarjeta: #1e293b;
            --bg-lateral: #1e293b;
            --texto-primario: #f8fafc;
            --texto-secundario: #94a3b8;
            --color-acento: #ff9f43;
            --color-acento-hover: #ffb366;
            --color-exito: #10b981;
            --sombra: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            --borde-radio: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-user-select: none; user-select: none; }
        body { background-color: var(--bg-principal); color: var(--texto-primario); height: 100vh; width: 100vw; display: flex; overflow: hidden; }

        /* Estilos Pantalla Inicio */
        .pantalla-inicio { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=1200') no-repeat center center/cover; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: opacity 0.5s ease, transform 0.5s ease; }
        .pantalla-inicio.ocultar { opacity: 0; transform: scale(1.05); pointer-events: none; }
        .inicio-contenido { text-align: center; max-width: 600px; padding: 0 2rem; }
        .inicio-contenido .marca { font-size: 1rem; text-transform: uppercase; letter-spacing: 6px; color: var(--color-acento); font-weight: 700; margin-bottom: 1.5rem; }
        .inicio-contenido h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 1.5rem; color: var(--texto-primario); }
        .inicio-contenido p { color: var(--texto-secundario); font-size: 1.1rem; line-height: 1.6; margin-bottom: 4rem; }
        .indicador-touch { display: inline-block; border-bottom: 2px solid var(--color-acento); padding-bottom: 0.5rem; font-weight: 600; font-size: 1rem; letter-spacing: 2px; color: var(--texto-primario); text-transform: uppercase; animation: sutil-pulso 2s infinite; }
        @keyframes sutil-pulso { 0%, 100% { opacity: 1; transform: translateY(0); } 50% { opacity: 0.5; transform: translateY(3px); } }

        /* Contenedor Principal con solución de descuadre */
        .contenedor-menu { flex: 1; min-width: 0; display: flex; flex-direction: column; padding: 2.5rem; overflow-y: auto; height: 100%; }
        header { margin-bottom: 2rem; width: 100%; }
        header h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.5px; }
        header h1 span { color: var(--color-acento); }
        header p { color: var(--texto-secundario); margin-top: 0.2rem; }
        
        /* Barra Categorías */
        .barra-categorias { display: flex; gap: 0.8rem; margin-bottom: 2rem; overflow-x: auto; padding-bottom: 0.5rem; width: 100%; }
        .btn-categoria { background-color: var(--bg-tarjeta); color: var(--texto-primario); border: 1px solid rgba(255, 255, 255, 0.05); padding: 0.8rem 1.5rem; border-radius: 30px; cursor: pointer; font-weight: 600; font-size: 0.95rem; white-space: nowrap; transition: all 0.25s ease; }
        .btn-categoria.activa { background-color: var(--color-acento); color: #000; border-color: var(--color-acento); }

        /* Grid de Productos */
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; width: 100%; padding-bottom: 2rem; }
        .tarjeta-producto { background-color: var(--bg-tarjeta); border-radius: var(--borde-radio); overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.03); box-shadow: var(--sombra); display: flex; flex-direction: column; }
        .img-producto { width: 100%; height: 160px; object-fit: cover; background-color: #151f32; }
        .info-producto { padding: 1.2rem; display: flex; flex-direction: column; flex: 1; }
        .info-producto h3 { font-size: 1.15rem; font-weight: 600; margin-bottom: 0.4rem; }
        .info-producto p { color: var(--texto-secundario); font-size: 0.85rem; line-height: 1.4; margin-bottom: 1.2rem; flex: 1; }
        .precio-accion { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .precio { font-size: 1.3rem; font-weight: 700; color: var(--color-acento); }
        .btn-agregar { background-color: rgba(255, 159, 67, 0.1); color: var(--color-acento); border: 1px solid rgba(255, 159, 67, 0.2); padding: 0.6rem 1rem; border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.2s ease; }
        .btn-agregar:hover { background-color: var(--color-acento); color: #000; }

        /* Carrito con corrección de flex-shrink */
        .lateral-carrito { width: 380px; flex-shrink: 0; background-color: var(--bg-lateral); border-left: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; padding: 2rem; box-shadow: -5px 0 25px rgba(0,0,0,0.2); height: 100%; }
        .lateral-carrito h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.8rem; }
        .lista-carrito { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
        .item-carrito { background-color: rgba(15, 23, 42, 0.4); border-radius: 12px; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .btn-pagar { width: 100%; background-color: var(--color-acento); color: #000; border: none; padding: 1.2rem; border-radius: var(--borde-radio); font-size: 1.1rem; font-weight: 700; cursor: pointer; }

        /* Modal */
        .modal-pago { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .contenido-modal { background-color: var(--bg-tarjeta); border-radius: 24px; width: 480px; padding: 2.5rem; box-shadow: var(--sombra); }
    </style>
</head>
<body>

    <div class="pantalla-inicio" id="pantalla-inicial" onclick="entrarAlMenu()">
        <div class="inicio-contenido">
            <div class="marca">Totem Food Experience</div>
            <h1>Una nueva forma de ordenar.</h1>
            <p>Presiona para comenzar</p>
            <div class="indicador-touch">Presiona para comenzar</div>
        </div>
    </div>

    <div class="contenedor-menu">
        <header>
            <h1>Mesa 04 <span>• Menú Digital</span></h1>
            <p>Selecciona tus productos y confirma tu orden</p>
        </header>
        <div class="barra-categorias" id="contenedor-categorias"></div>
        <div class="grid-productos" id="contenedor-productos"></div>
    </div>

    <div class="lateral-carrito">
        <h2>Mi Pedido</h2>
        <div class="lista-carrito" id="elementos-carrito"></div>
        <div class="carrito-totales">
            <div class="fila-total" style="display:flex; justify-content:space-between; margin-bottom: 1rem;">
                <span>Total:</span>
                <strong id="total-pedido">$0</strong>
            </div>
            <button class="btn-pagar" onclick="enviarOrden()">Confirmar y Pagar</button>
        </div>
    </div>

    <div class="modal-pago" id="modal-pasarela">
        <div class="contenido-modal" id="contenido-modal-dinamico">
            </div>
    </div>

    <script>
        // DATOS MOCK BASADOS EN TU SQL
        const mockCategorias = [
            {idCategoria: 1, nombreCategoria: 'Hamburguesas'},
            {idCategoria: 2, nombreCategoria: 'Papas Fritas y Acompañamientos'},
            {idCategoria: 3, nombreCategoria: 'Bebidas y Refrescos'},
            {idCategoria: 4, nombreCategoria: 'Postres y Helados'},
            {idCategoria: 5, nombreCategoria: 'Combos Promocionales'},
            {idCategoria: 6, nombreCategoria: 'Salsas y Extras'}
        ];

        const mockProductos = [
            {idProducto:1, nombreProducto:'Hamburguesa Italiana', descripcionProducto:'Jugosa carne de vacuno, palta fresca molida, tomate picado y mayonesa casera.', precio:6500, idCategoria:1, urlImagen:'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500'},
            {idProducto:2, nombreProducto:'Burger Cheddar Bacon', descripcionProducto:'Doble carne, triple queso cheddar fundido, tocino ahumado crujiente y salsa BBQ.', precio:7200, idCategoria:1, urlImagen:'https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=500'},
            {idProducto:3, nombreProducto:'Hamburguesa Chacarera', descripcionProducto:'Carne de vacuno a la plancha, porotos verdes tiernos, ají verde y tomate fresco.', precio:6800, idCategoria:1, urlImagen:'https://images.unsplash.com/photo-1586190848861-99aa4a171e90?w=500'},
            {idProducto:4, nombreProducto:'Papas Fritas Medianas', descripcionProducto:'Papas rústicas cortadas a mano, doradas y crujientes con un toque de sal marina.', precio:2500, idCategoria:2, urlImagen:'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=500'},
            {idProducto:5, nombreProducto:'Papas Supremas Cheddar', descripcionProducto:'Porción grande de papas fritas bañadas en salsa de queso cheddar y trozos de tocino.', precio:4500, idCategoria:2, urlImagen:'https://images.unsplash.com/photo-1585109649139-366815a0d713?w=500'},
            {idProducto:6, nombreProducto:'Aros de Cebolla Crujientes', descripcionProducto:'10 unidades de aros de cebolla rebozados en panko, fritos al minuto.', precio:2800, idCategoria:2, urlImagen:'https://images.unsplash.com/photo-1639024471283-2da7b3c6a267?w=500'},
            {idProducto:7, nombreProducto:'Bebida en Lata 350ml', descripcionProducto:'Variedad de refrescos (Coca-Cola, Sprite, Fanta) helados en lata.', precio:1500, idCategoria:3, urlImagen:'https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=500'},
            {idProducto:8, nombreProducto:'Jugo Natural del Día', descripcionProducto:'Exprimido natural de fruta de la estación (Frutilla, Frambuesa o Mango).', precio:2500, idCategoria:3, urlImagen:'https://images.unsplash.com/photo-1536882240095-0379873feb4e?w=500'},
            {idProducto:9, nombreProducto:'Agua Mineral 500ml', descripcionProducto:'Agua purificada premium, disponible con o sin gas, muy helada.', precio:1200, idCategoria:3, urlImagen:'https://images.unsplash.com/photo-1608885898957-a599fb1698d6?w=500'},
            {idProducto:10, nombreProducto:'Brownie con Helado', descripcionProducto:'Brownie casero tibio de chocolate amargo acompañado de una bola de helado de vainilla.', precio:3500, idCategoria:4, urlImagen:'https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=500'},
            {idProducto:11, nombreProducto:'Copa de Helado Artesanal', descripcionProducto:'Tres suntuosas bolas de helado a elección con salsa de chocolate y mostacillas.', precio:2900, idCategoria:4, urlImagen:'https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=500'},
            {idProducto:12, nombreProducto:'Combo Italiano Clásico', descripcionProducto:'Hamburguesa Italiana + Papas Fritas Medianas + Bebida en lata a elección.', precio:8900, idCategoria:5, urlImagen:'https://images.unsplash.com/photo-1610614819513-58e34989848b?w=500'},
            {idProducto:13, nombreProducto:'Mega Combo Cheddar Doble', descripcionProducto:'Burger Cheddar Bacon + Papas Supremas + Bebida en lata a elección.', precio:10500, idCategoria:5, urlImagen:'https://images.unsplash.com/photo-1550547660-d9450f859349?w=500'},
            {idProducto:14, nombreProducto:'Salsa Mayo Casera de Ajo', descripcionProducto:'Pote extra de nuestra famosa mayonesa artesanal con un toque sutil de ajo.', precio:600, idCategoria:6, urlImagen:'https://images.unsplash.com/photo-1571115177098-24ec420951d5?w=500'},
            {idProducto:15, nombreProducto:'Porción de Queso Cheddar Extra', descripcionProducto:'Salsa de queso cheddar líquido extra caliente para untar tus snacks.', precio:1000, idCategoria:6, urlImagen:'https://images.unsplash.com/photo-1552763427-4d68e3ac1b1a?w=500'}
        ];

        let carrito = [];

        // Inicialización
        document.addEventListener('DOMContentLoaded', () => {
            renderizarCategorias(mockCategorias);
            desplegarProductos(mockProductos);
        });

        function entrarAlMenu() {
            document.getElementById("pantalla-inicial").classList.add("ocultar");
            setTimeout(() => { document.getElementById("pantalla-inicial").style.display = "none"; }, 500);
        }

        function renderizarCategorias(cats) {
            const container = document.getElementById("contenedor-categorias");
            container.innerHTML = `<button class="btn-categoria activa" onclick="filtrar(null, this)">Todos</button>` + 
                cats.map(c => `<button class="btn-categoria" onclick="filtrar(${c.idCategoria}, this)">${c.nombreCategoria}</button>`).join('');
        }

        function desplegarProductos(lista) {
            const container = document.getElementById("contenedor-productos");
            container.innerHTML = lista.map(p => `
                <div class="tarjeta-producto">
                    <img src="${p.urlImagen}" class="img-producto">
                    <div class="info-producto">
                        <h3>${p.nombreProducto}</h3>
                        <p>${p.descripcionProducto}</p>
                        <div class="precio-accion">
                            <span class="precio">$${p.precio.toLocaleString('es-CL')}</span>
                            <button class="btn-agregar" onclick="agregar(${p.idProducto})">Agregar</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filtrar(id, btn) {
            document.querySelectorAll('.btn-categoria').forEach(b => b.classList.remove('activa'));
            btn.classList.add('activa');
            desplegarProductos(id ? mockProductos.filter(p => p.idCategoria === id) : mockProductos);
        }

        function agregar(id) {
            const p = mockProductos.find(x => x.idProducto === id);
            const item = carrito.find(x => x.producto.idProducto === id);
            item ? item.cantidad++ : carrito.push({producto: p, cantidad: 1});
            actualizarCarrito();
        }

        function actualizarCarrito() {
            const list = document.getElementById("elementos-carrito");
            let total = 0;
            list.innerHTML = carrito.map(c => {
                total += (c.producto.precio * c.cantidad);
                return `<div class="item-carrito">
                    <div><strong>${c.producto.nombreProducto}</strong><br>x${c.cantidad} - $${(c.producto.precio * c.cantidad).toLocaleString('es-CL')}</div>
                </div>`;
            }).join('');
            document.getElementById("total-pedido").innerText = `$${total.toLocaleString('es-CL')}`;
        }

        function enviarOrden() {
            if(carrito.length === 0) return alert("El carrito está vacío");
            const modal = document.getElementById("modal-pasarela");
            document.getElementById("contenido-modal-dinamico").innerHTML = `
                <h2>Pedido Confirmado</h2>
                <p>Tu orden ha sido enviada a cocina.</p>
                <button class="btn-pagar" style="margin-top:20px" onclick="location.reload()">Nuevo Pedido</button>
            `;
            modal.style.display = "flex";
        }
    </script>
</body>
</html>
